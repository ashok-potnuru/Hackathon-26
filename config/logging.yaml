version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stdout

loggers:
  core.stages:
    level: INFO
  adapters:
    level: INFO
  api:
    level: INFO

root:
  level: WARNING
  handlers: [console]
